name: Daily Leaderboard Update

on:
  schedule:
    # 10:00 Singapore Time = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual runs

permissions:
  contents: write
  actions: write   # for `gh workflow run pages.yml` (default GITHUB_TOKEN otherwise gets 403)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate candidate gateways
        run: python scripts/validate_candidates.py

      - name: Compute 30-day uptime
        run: python scripts/compute_uptime.py

      - name: Render blacklist.md from blacklist.json
        run: python scripts/render_blacklist.py

      - name: Generate leaderboard + history snapshot
        run: python scripts/generate_leaderboard.py

      - name: Build GitHub Pages site exports (CSV, RSS, llms-full)
        run: python scripts/build_site.py

      - name: Self-check site consistency
        run: python scripts/selfcheck.py

      - name: Commit & push changes
        run: |
          git config user.name  "awesome-ai-api-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A data/ docs/ README.md README.zh-CN.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            STAMP=$(date -u -d '+8 hours' +'%Y-%m-%d %H:%M SGT')
            git commit -m "chore(leaderboard): daily refresh ${STAMP}"
            git push
          fi

      - name: Trigger Pages deploy
        if: success()
        run: |
          if ! git diff --cached --quiet 2>/dev/null || git log -1 --format=%s | grep -q "daily refresh"; then
            gh workflow run pages.yml
          fi
        env:
          GH_TOKEN: ${{ github.token }}
