# sites.yaml — human-curated overrides for auto-validated gateways.
#
# Precedence: top-level key is matched against (full URL) → (netloc) → (bare netloc).
# Fields (all optional):
#   name:     display name in leaderboard
#   region:   cn | global | self-hosted
#   verdict:  force a tier (likely_relay | probable_relay | needs_review | directory | hidden)
#   upstream: packycode | aws-kiro | direct-anthropic | direct-openrouter | unknown
#   note:     short comment shown in gateway detail page
#
# Anyone can PR edits to this file. No CI magic — the validator just reads it.

apimart.ai:
  name: "APIMart"
  region: "global"

apid.aaife.cn:
  name: "AAIFE API"
  region: "cn"
  note: "Static marketing page — unverified relay; needs evidence of real /v1 endpoint."
  verdict: "needs_review"

